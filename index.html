<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Meme Str</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --accent: #ff3d3d;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Splash ── */
  #splash {
    position: fixed; inset: 0; z-index: 999;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    transition: opacity .6s ease, visibility .6s ease;
  }
  #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  .splash-logo { font-size: clamp(2.8rem,9vw,4.5rem); font-weight: 900; letter-spacing: -3px; color: #fff; line-height: 1; }
  .splash-logo span { color: var(--accent); }
  .splash-sub { font-size: .78rem; color: rgba(255,255,255,.38); letter-spacing: 4px; text-transform: uppercase; }
  .loader-ring { width: 44px; height: 44px; border: 2.5px solid rgba(255,255,255,.08); border-top-color: var(--accent); border-radius: 50%; animation: spin .75s linear infinite; margin-top: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Viewport ── */
  #viewport { width: 100%; height: 100%; position: relative; overflow: hidden; }

  /* ── Slide ── */
  .slide {
    position: absolute; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    will-change: transform;
    transition: transform .42s cubic-bezier(.77,0,.18,1);
  }
  .slide img {
    display: block; max-width: 100%; max-height: 100%;
    width: auto; height: auto; object-fit: contain; pointer-events: none;
  }
  .slide-skeleton {
    width: 85%; max-width: 480px; height: 58vh; border-radius: 12px;
    background: linear-gradient(90deg, #141414 25%, #1e1e1e 50%, #141414 75%);
    background-size: 200% 100%; animation: shimmer 1.3s infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* ── Top bar ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    padding: calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;
    display: flex; align-items: center; justify-content: space-between;
    pointer-events: none; z-index: 20;
  }
  #counter { font-size: .72rem; letter-spacing: 1.5px; color: rgba(255,255,255,.3); font-variant-numeric: tabular-nums; background: rgba(0,0,0,.45); padding: 4px 11px; border-radius: 20px; }
  #source-badge { background: rgba(255,255,255,.06); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.12); border-radius: 20px; padding: 4px 11px; font-size: .65rem; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,.45); }

  /* ── Action buttons ── */
  #actions {
    position: fixed; right: 14px;
    bottom: calc(env(safe-area-inset-bottom,0px) + 72px);
    display: flex; flex-direction: column; gap: 12px; z-index: 20;
    transition: opacity .45s, transform .45s;
    opacity: 0; transform: translateX(62px); pointer-events: none;
  }
  #actions.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }

  .action-btn {
    width: 50px; height: 50px; border-radius: 50%;
    background: rgba(255,255,255,.09); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative; overflow: hidden;
    transition: background .18s, transform .12s;
    -webkit-tap-highlight-color: transparent;
  }
  .action-btn:active { background: rgba(255,255,255,.2); transform: scale(.88); }
  .action-btn svg { width: 20px; height: 20px; stroke: rgba(255,255,255,.82); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; transition: stroke .2s; }
  #btn-share { background: rgba(255,61,61,.1); border-color: rgba(255,61,61,.22); }
  #btn-share svg { stroke: #ff8080; }
  #btn-download.ok svg { stroke: #4ade80; }

  .btn-label {
    position: absolute; right: 58px; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,.7); border: 1px solid rgba(255,255,255,.08);
    color: rgba(255,255,255,.7); font-size: .65rem; letter-spacing: 1px;
    padding: 3px 9px; border-radius: 20px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity .2s;
    text-transform: uppercase;
  }
  .action-btn:hover .btn-label { opacity: 1; }

  /* ── Swipe hint ── */
  #hint {
    position: fixed; bottom: calc(env(safe-area-inset-bottom,0px) + 22px);
    left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    animation: hintFloat 2.2s ease-in-out infinite;
    transition: opacity .5s; pointer-events: none; z-index: 10;
  }
  #hint.gone { opacity: 0; }
  .chevrons { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .chevrons svg { opacity: 0; animation: chFade 1.9s ease-in-out infinite; }
  .chevrons svg:nth-child(1) { animation-delay: 0s; }
  .chevrons svg:nth-child(2) { animation-delay: .22s; }
  .chevrons svg:nth-child(3) { animation-delay: .44s; }
  @keyframes chFade { 0%,100% { opacity:0; transform:translateY(5px); } 50% { opacity:.6; transform:translateY(0); } }
  .hint-label { font-size: .62rem; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,.3); }
  @keyframes hintFloat { 0%,100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-7px); } }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: calc(env(safe-area-inset-bottom,0px) + 74px);
    left: 50%; transform: translateX(-50%);
    background: rgba(18,18,18,.96); border: 1px solid rgba(255,255,255,.1);
    color: #fff; padding: 10px 20px; border-radius: 30px;
    font-size: .8rem; opacity: 0; transition: opacity .3s;
    pointer-events: none; z-index: 99; white-space: nowrap;
  }
  #toast.show { opacity: 1; }
  #toast.ok   { border-color: rgba(74,222,128,.4); }
  #toast.err  { border-color: rgba(255,61,61,.4); }
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">meme<span>scroll</span></div>
  <div class="splash-sub">swipe up to vibe</div>
  <div class="loader-ring"></div>
</div>

<div id="viewport"></div>

<div id="topbar">
  <div id="counter">#1</div>
  <div id="source-badge">loading…</div>
</div>

<div id="actions">
  <button class="action-btn" id="btn-share" aria-label="Share">
    <span class="btn-label">Share</span>
    <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
  </button>
  <button class="action-btn" id="btn-download" aria-label="Download">
    <span class="btn-label">Save</span>
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
  </button>
</div>

<div id="hint">
  <div class="chevrons">
    <svg width="18" height="10" viewBox="0 0 18 10" fill="none"><polyline points="2,8 9,2 16,8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <svg width="18" height="10" viewBox="0 0 18 10" fill="none"><polyline points="2,8 9,2 16,8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <svg width="18" height="10" viewBox="0 0 18 10" fill="none"><polyline points="2,8 9,2 16,8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="hint-label">swipe up</div>
</div>

<div id="toast"></div>

<script>
// ── CONFIG ─────────────────────────────────────────
const PRELOAD_AHEAD   = 5;
const FETCH_WHEN_LEFT = 8;

// ── STATE ──────────────────────────────────────────
let pool        = [];
let slides      = [];
let totalSeen   = 1;
let isAnimating = false;
let hintDone    = false;
let fetching    = false;
let currentUrl  = '';
let roundIdx    = 0;
let toastTimer;

const viewport = document.getElementById('viewport');
const hint     = document.getElementById('hint');
const badge    = document.getElementById('source-badge');
const counter  = document.getElementById('counter');
const actions  = document.getElementById('actions');
const toast    = document.getElementById('toast');

// ── URL QUALITY GUARD ──────────────────────────────
// Only accept images from real Reddit/Imgur hosting (actual posted memes, not templates)
const ALLOWED_HOSTS = ['i.redd.it','preview.redd.it','i.imgur.com','external-preview.redd.it'];
const BLOCKED_TERMS = ['imgflip','template','blank','placeholder'];

function isGoodMeme(url) {
  if (!url) return false;
  const lc = url.toLowerCase();
  if (BLOCKED_TERMS.some(t => lc.includes(t))) return false;
  try {
    const host = new URL(url).hostname;
    return ALLOWED_HOSTS.some(h => host === h || host.endsWith('.'+h));
  } catch { return false; }
}

// ── SOURCES ────────────────────────────────────────
// ── SUBREDDIT POOLS ────────────────────────────────
// Source 1 & 2: Reddit direct JSON (16 original + 8 new subs)
const SUBS_CLASSIC = [
  'memes','dankmemes','me_irl','funny','AdviceAnimals',
  'terriblefacebookmemes','surrealmemes','PrequelMemes',
  'lotrmemes','HistoryMemes','shitposting','BikiniBottomTwitter',
  'trippinthroughtime','BrandNewSentence','antimeme','okbuddyretard',
];

// SOURCE 3 (NEW): Wholesome & niche meme subs via Reddit direct JSON
const SUBS_WHOLESOME = [
  'wholesomememes','HolUp','facepalm','Unexpected',
  'MemeEconomy','SequelMemes','startrekMemes','GoodGoodMemes',
];

// SOURCE 4 (NEW): meme-api.com targeted subreddit endpoint
// Lets us pull from specific high-quality subs with their curated filter
const SUBS_MEMEAPI_TARGETED = [
  'ProgrammerHumor','technicallythetruth','Damnthatsinteresting',
  'interestingasfuck','CrackheadCraigslist','facepalm','HolUp',
];

// ── SOURCE FETCHERS ────────────────────────────────

// Source 1: meme-api.com random (already curated)
async function fetchMemeAPI() {
  const r = await fetch('https://meme-api.com/gimme/50', { signal: AbortSignal.timeout(7000) });
  const d = await r.json();
  return (d.memes || [])
    .filter(m => isGoodMeme(m.url))
    .map(m => ({ url: m.url, source: m.subreddit ? `r/${m.subreddit}` : 'meme-api' }));
}

// Source 2: Reddit direct JSON — classic meme subs
async function fetchRedditSub(sub) {
  const sort = ['hot','top'][Math.random() > .5 ? 1 : 0];
  const t    = ['day','week','month','all'][Math.floor(Math.random()*4)];
  const r = await fetch(
    `https://www.reddit.com/r/${sub}/${sort}.json?limit=50&t=${t}&raw_json=1`,
    { signal: AbortSignal.timeout(7000) }
  );
  const d = await r.json();
  return (d?.data?.children || [])
    .map(p => p.data)
    .filter(p => !p.is_video && isGoodMeme(p.url))
    .map(p => ({ url: p.url, source: `r/${sub}` }));
}

// Source 3 (NEW): Reddit direct JSON — wholesome & niche subs
async function fetchWholesomeSub() {
  const sub = SUBS_WHOLESOME[Math.floor(Math.random() * SUBS_WHOLESOME.length)];
  return fetchRedditSub(sub);
}

// Source 4 (NEW): meme-api.com targeted sub endpoint
// Uses meme-api's own curated filter on specific subreddits
async function fetchMemeAPITargeted() {
  const sub   = SUBS_MEMEAPI_TARGETED[Math.floor(Math.random() * SUBS_MEMEAPI_TARGETED.length)];
  const count = 20;
  const r = await fetch(`https://meme-api.com/gimme/${sub}/${count}`, { signal: AbortSignal.timeout(7000) });
  const d = await r.json();
  return (d.memes || [])
    .filter(m => isGoodMeme(m.url))
    .map(m => ({ url: m.url, source: `r/${m.subreddit || sub}` }));
}

function randSub() { return SUBS_CLASSIC[Math.floor(Math.random() * SUBS_CLASSIC.length)]; }

const FETCHERS = [
  fetchMemeAPI,           // Source 1
  () => fetchRedditSub(randSub()),  // Source 2
  fetchWholesomeSub,      // Source 3 (NEW)
  fetchMemeAPITargeted,   // Source 4 (NEW)
  () => fetchRedditSub(randSub()),
  fetchMemeAPITargeted,
];

async function refillPool() {
  if (fetching) return;
  fetching = true;
  try {
    const tasks = [];
    for (let i = 0; i < 3; i++) { tasks.push(FETCHERS[roundIdx++ % FETCHERS.length]()); }
    const results = await Promise.allSettled(tasks);
    let fresh = results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
    // Shuffle
    for (let i = fresh.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1));
      [fresh[i],fresh[j]] = [fresh[j],fresh[i]];
    }
    const seen = new Set(pool.map(m => m.url));
    pool = pool.concat(fresh.filter(m => !seen.has(m.url)));
  } finally { fetching = false; }
}

// ── SLIDE BUILDER ──────────────────────────────────
function loadImageIntoSlide(el, item) {
  if (!item) return;
  const sk = el.querySelector('.slide-skeleton');

  el.dataset.url    = item.url;
  el.dataset.source = item.source || '';

  // Remove any previous img
  el.querySelector('img')?.remove();

  const img = new Image();
  img.alt = '';
  img.draggable = false;

  img.onload = () => {
    // Tiny / tracking pixel — silently swap to next pool item
    if (img.naturalWidth < 80 || img.naturalHeight < 80) {
      const next = pool.shift();
      if (next) { loadImageIntoSlide(el, next); return; }
      // nothing left — just keep skeleton until refill
      return;
    }
    sk?.remove();
    // Sync current state if this is the front slide
    if (el === slides[0]) {
      currentUrl        = item.url;
      badge.textContent = item.source || '—';
    }
  };

  img.onerror = () => {
    // Broken URL — silently swap to next pool item, NO auto-advance
    const next = pool.shift();
    if (next) { loadImageIntoSlide(el, next); return; }
    // If pool is empty show a retry skeleton and wait for refill
    if (!el.querySelector('.slide-skeleton')) {
      const s = document.createElement('div');
      s.className = 'slide-skeleton';
      el.appendChild(s);
    }
    refillPool().then(() => {
      const n = pool.shift();
      if (n) loadImageIntoSlide(el, n);
    });
  };

  // No crossOrigin — avoids CORS rejections that trigger onerror cascade
  img.src = item.url;
  el.appendChild(img);
}

function makeSlide(item, yPct) {
  const el  = document.createElement('div');
  el.className = 'slide';
  el.style.transform = `translateY(${yPct}%)`;

  const sk = document.createElement('div');
  sk.className = 'slide-skeleton';
  el.appendChild(sk);

  if (item) loadImageIntoSlide(el, item);
  return el;
}

function preloadAhead() {
  pool.slice(0, PRELOAD_AHEAD).forEach(item => {
    const img = new Image();
    img.src = item.url; // no crossOrigin — avoids CORS rejection
  });
}

// ── INIT ───────────────────────────────────────────
async function init() {
  await refillPool();
  let w = 0;
  while (pool.length < 2 && w++ < 60) await new Promise(r => setTimeout(r, 150));

  const a = pool.shift();
  const b = pool.shift() || null;
  const s0 = makeSlide(a,   0);
  const s1 = makeSlide(b, 100);
  viewport.appendChild(s0);
  viewport.appendChild(s1);
  slides = [s0, s1];

  currentUrl = a?.url || '';
  badge.textContent   = a?.source || '—';
  counter.textContent = '#1';
  preloadAhead();
  document.getElementById('splash').classList.add('hidden');
}

// ── NAVIGATE ───────────────────────────────────────
function goNext() {
  if (isAnimating) return;
  isAnimating = true;
  dismissHint();

  slides[0].style.transform = 'translateY(-100%)';
  if (slides[1]) slides[1].style.transform = 'translateY(0%)';

  totalSeen++;
  counter.textContent = `#${totalSeen}`;
  currentUrl          = slides[1]?.dataset.url    || '';
  badge.textContent   = slides[1]?.dataset.source || '—';

  setTimeout(() => {
    slides[0].remove();
    slides.shift();
    const next = makeSlide(pool.shift() || null, 100);
    viewport.appendChild(next);
    slides.push(next);
    if (pool.length < FETCH_WHEN_LEFT) refillPool().then(preloadAhead);
    isAnimating = false;
  }, 430);
}

function dismissHint() {
  if (!hintDone) {
    hintDone = true;
    hint.classList.add('gone');
    setTimeout(() => actions.classList.add('visible'), 300);
  }
}

// ── DOWNLOAD ───────────────────────────────────────
// CORS proxies tried in order until one works
const PROXIES = [
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://cors-anywhere.herokuapp.com/${u}`,
];

async function fetchViaProxy(url) {
  for (const proxyFn of PROXIES) {
    try {
      const res = await fetch(proxyFn(url), { signal: AbortSignal.timeout(10000) });
      if (res.ok) {
        const blob = await res.blob();
        if (blob.size > 500) return blob; // real image, not error page
      }
    } catch { /* try next proxy */ }
  }
  return null;
}

async function downloadMeme() {
  const url = currentUrl;
  if (!url) return;

  const btn = document.getElementById('btn-download');
  btn.style.pointerEvents = 'none';
  showToast('⬇️ Downloading…');

  try {
    const blob = await fetchViaProxy(url);

    if (blob) {
      const ext  = (url.split('?')[0].split('.').pop().split('#')[0] || 'jpg').toLowerCase();
      const safe = ['jpg','jpeg','png','gif','webp'].includes(ext) ? ext : 'jpg';
      const a    = document.createElement('a');
      a.href     = URL.createObjectURL(blob);
      a.download = `meme_${Date.now()}.${safe}`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);

      btn.classList.add('ok');
      setTimeout(() => btn.classList.remove('ok'), 1800);
      showToast('✅ Saved to device!', 'ok');
    } else {
      // All proxies failed — last resort: force download via anchor with no target
      showToast('⚠️ Trying direct save…');
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `meme_${Date.now()}.jpg`;
      // No _blank — let browser handle as download
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      showToast('💾 Check your downloads!', 'ok');
    }
  } finally {
    btn.style.pointerEvents = '';
  }
}

// ── SHARE ──────────────────────────────────────────
async function shareMeme() {
  const url = currentUrl;
  if (!url) return;
  if (navigator.share) {
    try {
      // Try file share first (mobile)
      const res  = await fetch(url, { mode: 'cors' });
      const blob = await res.blob();
      const ext  = (url.split('?')[0].split('.').pop() || 'jpg').toLowerCase();
      const file = new File([blob], `meme.${ext}`, { type: blob.type });
      if (navigator.canShare?.({ files: [file] })) {
        await navigator.share({ files: [file], title: 'Found this meme 😂' });
        return;
      }
      await navigator.share({ title: 'Check this meme!', url });
      return;
    } catch(e) { if (e.name === 'AbortError') return; }
  }
  // Desktop fallback
  try {
    await navigator.clipboard.writeText(url);
    showToast('🔗 Link copied!', 'ok');
  } catch { showToast('❌ Copy failed', 'err'); }
}

// ── TOAST ──────────────────────────────────────────
function showToast(msg, type) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className   = type ? `show ${type}` : 'show';
  toastTimer = setTimeout(() => { toast.className = ''; }, 2500);
}

// ── INPUTS ─────────────────────────────────────────
document.getElementById('btn-download').addEventListener('click', e => { e.stopPropagation(); downloadMeme(); });
document.getElementById('btn-share').addEventListener('click',    e => { e.stopPropagation(); shareMeme();   });

let tY = 0, tT = 0;
viewport.addEventListener('touchstart', e => {
  if (e.target.closest('.action-btn')) return;
  tY = e.touches[0].clientY; tT = Date.now();
}, { passive: true });
viewport.addEventListener('touchmove', e => { e.preventDefault(); }, { passive: false });
viewport.addEventListener('touchend', e => {
  if (e.target.closest('.action-btn')) return;
  const dy = tY - e.changedTouches[0].clientY;
  const dt = Date.now() - tT;
  if (dy > 45 || (dt < 280 && dy > 18)) goNext();
}, { passive: true });

let mDown = false, mY = 0;
viewport.addEventListener('mousedown', e => { if (!e.target.closest('.action-btn')) { mDown = true; mY = e.clientY; } });
window.addEventListener('mouseup', e => { if (mDown && mY - e.clientY > 45) goNext(); mDown = false; });

let wBusy = false;
window.addEventListener('wheel', e => {
  e.preventDefault();
  if (wBusy) return;
  if (e.deltaY > 25) { wBusy = true; goNext(); setTimeout(() => wBusy = false, 650); }
}, { passive: false });

window.addEventListener('keydown', e => {
  if (e.code === 'ArrowDown' || e.code === 'Space') { e.preventDefault(); goNext(); }
});

// ── GO ─────────────────────────────────────────────
init().catch(() => {
  document.getElementById('splash').innerHTML = `
    <div style="color:#ff3d3d;font-size:1rem;padding:24px;text-align:center;line-height:1.8">
      😢 Couldn't load memes<br>
      <small style="color:#555;font-size:.8rem">Check connection &amp; refresh</small>
    </div>`;
});
</script>
</body>
</html>
